<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Box</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    height: 100vh;
}

.auth-card {
    width: 340px;
    padding: 30px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    color: white;
    text-align: center;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    width: 48%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.btn-row {
    display: flex;
    justify-content: space-between;
}

.login {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.signup {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
}
</style>
</head>

<body>

<div class="auth-card">
    <h2>Login / Signup</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <div class="btn-row">
        <button class="login" onclick="login()">Login</button>
        <button class="signup" onclick="signup()">Signup</button>
    </div>
</div>

<script>
function login() {
    // simple navigation to index page
    window.location.href = "index.html";
}

function signup() {
    alert("Signup Successful");
    window.location.href = "index.html";
}
</script>

</body>
</html>
